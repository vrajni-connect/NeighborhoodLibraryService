version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/library
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  postgres_data:
